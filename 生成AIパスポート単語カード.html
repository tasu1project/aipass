<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成AIパスポート 単語帳</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede8;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #999994;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --amber-bg: #FAEEDA;
    --amber-text: #854F0B;
    --amber-border: #BA7517;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --red-border: #E24B4A;
    --ch1: #534AB7; --ch1-bg: #EEEDFE;
    --ch2: #0F6E56; --ch2-bg: #E1F5EE;
    --ch3: #993C1D; --ch3-bg: #FAECE7;
    --ch4: #185FA5; --ch4-bg: #E6F1FB;
    --ch5: #3B6D11; --ch5-bg: #EAF3DE;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2a2a28;
      --bg3: #333331;
      --text: #f0efe8;
      --text2: #9b9b95;
      --text3: #666662;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --ch1: #9f99e8; --ch1-bg: #26215C;
      --ch2: #5DCAA5; --ch2-bg: #04342C;
      --ch3: #F0997B; --ch3-bg: #4A1B0C;
      --ch4: #85B7EB; --ch4-bg: #042C53;
      --ch5: #97C459; --ch5-bg: #173404;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
  }
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }
  header { margin-bottom: 1.5rem; }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  header p { font-size: 13px; color: var(--text2); }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1rem;
  }
  select, .btn {
    font-size: 13px;
    padding: 7px 12px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: background .15s;
    font-family: inherit;
  }
  select:hover, .btn:hover { background: var(--bg2); }

  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1rem;
  }
  .stat {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text2);
  }
  .stat span { font-weight: 600; color: var(--text); margin-left: 3px; }

  .progress-bar {
    height: 4px;
    background: var(--bg2);
    border-radius: 2px;
    margin-bottom: 1.2rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width .4s;
  }

  /* カード */
  .card-area { perspective: 1000px; margin-bottom: .8rem; }
  .card-wrapper {
    width: 100%;
    min-height: 190px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .45s ease;
    cursor: pointer;
  }
  .card-wrapper.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    min-height: 190px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }
  .card-back {
    transform: rotateY(180deg);
    background: var(--bg2);
  }
  .card-meta {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 12px;
    text-align: center;
  }
  .card-term {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    line-height: 1.4;
  }
  .card-hint { font-size: 12px; color: var(--text3); margin-top: 14px; }
  .card-desc {
    font-size: 14px;
    color: var(--text);
    text-align: center;
    line-height: 1.8;
  }

  /* ナビ */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: .8rem;
  }
  .nav-btn {
    font-size: 13px;
    padding: 8px 18px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    transition: background .15s;
  }
  .nav-btn:hover { background: var(--bg2); }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .progress-text { font-size: 14px; color: var(--text2); }

  /* 評価ボタン */
  .rating-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .r-btn {
    font-size: 13px;
    padding: 7px 18px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .r-btn.good:hover, .r-btn.rated-good { background: var(--green-bg); color: var(--green-text); border-color: var(--green); }
  .r-btn.ok:hover, .r-btn.rated-ok { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
  .r-btn.bad:hover, .r-btn.rated-bad { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }

  .empty { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }

  /* チャプターバッジ */
  .ch-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 10px;
  }

  /* フッター */
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    margin-top: 2rem;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>生成AIパスポート 単語帳</h1>
    <p id="subtitle">シラバス全キーワード収録 — カードをクリックで意味を表示</p>
  </header>

  <div class="controls">
    <select id="chapter-filter">
      <option value="all">すべての章</option>
      <option value="1">第1章 AI（人工知能）</option>
      <option value="2">第2章 生成AI</option>
      <option value="3">第3章 動向・サービス</option>
      <option value="4">第4章 情報リテラシー・法律</option>
      <option value="5">第5章 プロンプト・LLM</option>
    </select>
    <select id="mode-filter">
      <option value="all">全カード</option>
      <option value="weak">✗ 苦手のみ</option>
      <option value="ok">△ 曖昧のみ</option>
      <option value="unrated">未確認のみ</option>
    </select>
    <button class="btn" id="shuffle-btn">⇄ シャッフル</button>
    <button class="btn" id="reset-btn">↺ リセット</button>
  </div>

  <div class="stats">
    <div class="stat">表示中<span id="stat-total">0</span></div>
    <div class="stat">✓ 理解<span id="stat-good">0</span></div>
    <div class="stat">△ 曖昧<span id="stat-ok">0</span></div>
    <div class="stat">✗ 苦手<span id="stat-bad">0</span></div>
    <div class="stat">未確認<span id="stat-unrated">0</span></div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="card-area" id="card-area">
    <div class="card-wrapper" id="card-wrapper" onclick="flipCard()">
      <div class="card-face">
        <div class="ch-badge" id="card-badge"></div>
        <div class="card-meta" id="card-meta"></div>
        <div class="card-term" id="card-term">-</div>
        <div class="card-hint">タップして説明を見る</div>
      </div>
      <div class="card-face card-back">
        <div class="ch-badge" id="card-badge2"></div>
        <div class="card-desc" id="card-desc">-</div>
      </div>
    </div>
  </div>

  <div class="rating-row" id="rating-row" style="display:none;">
    <button class="r-btn good" id="rb-good" onclick="rate('good')">✓ 理解した</button>
    <button class="r-btn ok"   id="rb-ok"   onclick="rate('ok')">△ 曖昧</button>
    <button class="r-btn bad"  id="rb-bad"  onclick="rate('bad')">✗ 苦手</button>
  </div>

  <div class="nav">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← 前へ</button>
    <span class="progress-text" id="progress-text">0 / 0</span>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">次へ →</button>
  </div>

  <footer>生成AIパスポート試験シラバス（2026年2月試験より適用）準拠</footer>
</div>

<script>
const D=[
/* ===第1章=== */
{c:1,t:"AI（人工知能）",d:"Artificial Intelligence。人間の知的活動（推論・学習・判断など）をコンピュータで再現する技術の総称。"},
{c:1,t:"ダートマス会議",d:"1956年に開催された会議。「人工知能（AI）」という言葉が初めて公式に使われた歴史的な場。"},
{c:1,t:"ルールベース",d:"人間があらかじめ定めたルール（条件分岐など）に従って動作するAI手法。専門家の知識をルールとして記述する。"},
{c:1,t:"機械学習",d:"データから自動的にパターンを学習し、予測・判断を行う手法。明示的なルール記述なしに性能が向上する。"},
{c:1,t:"学習済みモデル",d:"大量のデータで事前に訓練済みのAIモデル。すぐに推論・予測に利用できる状態のもの。"},
{c:1,t:"教師あり学習",d:"正解ラベル付きデータを用いてモデルを訓練する機械学習の手法。分類・回帰などに使われる。"},
{c:1,t:"教師なし学習",d:"正解ラベルなしのデータからパターンや構造を発見する手法。クラスタリングなどに使われる。"},
{c:1,t:"クラスタリング",d:"教師なし学習の一種。データを似た特徴を持つグループ（クラスター）に自動的に分類する手法。"},
{c:1,t:"次元削減",d:"高次元データの特徴を保ちながら低次元に変換する手法。可視化や計算コスト削減に役立つ。"},
{c:1,t:"強化学習",d:"エージェントが環境と相互作用し、報酬を最大化する行動を学習する手法。ゲームAIなどに応用。"},
{c:1,t:"半教師あり学習",d:"少量のラベルありデータと大量のラベルなしデータを組み合わせて学習する手法。"},
{c:1,t:"ノーフリーランチ定理",d:"すべての問題に対して最良のアルゴリズムは存在しないという定理。問題ごとに適切な手法の選択が必要。"},
{c:1,t:"ニューロン",d:"脳を構成する神経細胞。信号を受け取り処理して次の神経細胞へ伝える。ニューラルネットワークのモデルの基礎。"},
{c:1,t:"シナプス",d:"ニューロン間の接続部分。信号の伝達強度（重み）を調整することで情報処理が行われる。"},
{c:1,t:"人工ニューロン（ノード）",d:"ニューラルネットワークの基本単位。入力を受け取り、重みを掛けて活性化関数に通し出力する。"},
{c:1,t:"ニューラルネットワーク",d:"人間の脳神経回路を模倣した機械学習モデル。入力層・隠れ層・出力層で構成される。"},
{c:1,t:"ディープラーニング",d:"多数の隠れ層を持つニューラルネットワークを用いた機械学習。画像認識・自然言語処理などで高精度を実現。"},
{c:1,t:"重み",d:"ニューラルネットワーク内の各結合に付与される数値。学習によって最適な値に調整される。"},
{c:1,t:"情報の重みづけ",d:"入力データの各要素に重みを掛けることで、重要な情報を強調し不要な情報を抑制する処理。"},
{c:1,t:"過学習（オーバーフィッティング）",d:"訓練データに過度に適合してしまい、未知のデータへの汎化性能が低下する現象。"},
{c:1,t:"正則化",d:"過学習を防ぐための手法。モデルの複雑さにペナルティを加えることで汎化性能を高める。"},
{c:1,t:"ドロップアウト",d:"学習時にランダムにニューロンを無効化する過学習防止手法。ニューラルネットワークの汎化性能を向上させる。"},
{c:1,t:"転移学習",d:"事前学習済みモデルの知識を別のタスクに活用する手法。少ないデータでも高い精度が得られる。"},
{c:1,t:"特徴量",d:"機械学習において予測に使用するデータの属性・変数。適切な特徴量の選択がモデル精度に影響する。"},
{c:1,t:"弱いAI（ANI）",d:"Artificial Narrow Intelligence。特定のタスクに特化したAI。現在実用化されているAIのほとんどがこれ。"},
{c:1,t:"強いAI（AGI）",d:"Artificial General Intelligence。人間と同等以上の汎用的な知性を持つAI。現時点では実現していない。"},
{c:1,t:"第一次AIブーム",d:"1950〜60年代。探索・推論を用いたゲームや数学の証明などに注目が集まった時期。"},
{c:1,t:"探索",d:"可能な状態や手順を系統的に調べ、目標を見つける手法。チェスや迷路解法などに活用された。"},
{c:1,t:"推論",d:"与えられた知識やルールから結論を導き出す処理。第一次・二次AIブームの中心的技術。"},
{c:1,t:"第二次AIブーム",d:"1980年代。エキスパートシステムが登場し、専門知識をルールとして蓄積するAIが注目された時期。"},

{c:1,t:"AIの冬",d:"AIへの期待が過剰となり失望から研究・投資が減少した時期。第一次・二次ブームの後に訪れた。"},
{c:1,t:"第三次AIブーム",d:"2010年代〜。ビッグデータとディープラーニングの発展により実用的なAIが急速に普及した時期。"},
{c:1,t:"ビッグデータ",d:"従来のデータ管理手法では扱えない大量・多様・高速なデータ。AIの学習に不可欠な資源。"},
{c:1,t:"シンギュラリティ（技術的特異点）",d:"AIが人間の知性を超え、文明や社会が根本的に変容するとされる仮説上の転換点。"},
{c:1,t:"ヴァーナー・ヴィンジ",d:"シンギュラリティの概念を1993年に広めたSF作家・数学者。技術的特異点を最初に論じた人物の一人。"},
{c:1,t:"レイ・カーツワイル",d:"未来学者・発明家。AIが人間の知性を超える時期を2045年と予測し「2045年問題」を提唱した。"},
{c:1,t:"2045年問題",d:"2045年頃にAIが人間の知性を超えるシンギュラリティが到来するという予測。レイ・カーツワイルが提唱。"},
{c:1,t:"AI効果",d:"AIがあるタスクを解決すると「それは真の知能ではない」とみなす傾向。AIの定義が絶えず変化する現象。"},
/* ===第2章=== */
{c:2,t:"生成AI（ジェネレーティブAI）",d:"テキスト・画像・音楽・動画などのコンテンツを生成できるAI。GPTやStable Diffusionなどが代表例。"},
{c:2,t:"ボルツマンマシン",d:"確率的ニューラルネットワークの一種。可視層と隠れ層を持ち、データの確率分布を学習する生成モデル。"},
{c:2,t:"制約付きボルツマンマシン",d:"ボルツマンマシンを効率化した手法。可視層と隠れ層のみ接続し学習を高速化したモデル。"},

{c:2,t:"畳み込み",d:"フィルターを画像に適用して特徴マップを生成する演算。エッジや模様などの局所パターンを検出する。"},

{c:2,t:"潜在ベクトル",d:"エンコーダが入力データを圧縮した低次元の特徴表現。類似データは潜在空間で近くに位置する。"},
{c:2,t:"GAN（敵対的生成ネットワーク）",d:"生成器と識別器が競い合いながら学習する生成モデル。リアルな画像生成などに活用される。"},

{c:2,t:"LSTM（長・短期記憶）",d:"RNNの一種。長期依存関係を学習できるよう設計されたモデル。ゲート機構で勾配消失問題を解決する。"},

{c:2,t:"自己注意力（Self-Attention）",d:"入力シーケンス内の各要素が他の要素との関連度を計算し、文脈を考慮した表現を生成する仕組み。"},
{c:2,t:"Attention Mechanism",d:"重要な情報に選択的に注目する仕組み。翻訳・要約・テキスト生成において精度を大幅に向上させた。"},

/* ===第3章=== */

{c:5,t:"芸術の批評（不得意）",d:"芸術的価値判断は主観的であり、LLMは一般的な傾向を述べることはできても深い批評が難しい。"},

const chName=["","第1章","第2章","第3章","第4章","第5章"];
const chFg=["","#534AB7","#0F6E56","#993C1D","#185FA5","#3B6D11"];
const chBg=["","#EEEDFE","#E1F5EE","#FAECE7","#E6F1FB","#EAF3DE"];

// localStorage で進捗を永続化
let ratings = JSON.parse(localStorage.getItem('genai_ratings') || '{}');
let cards=[...D], current=0, flipped=false;
let filterCh="all", filterMode="all";

function saveRatings(){ localStorage.setItem('genai_ratings', JSON.stringify(ratings)); }

function getFiltered(){
  return D.filter(c=>{
    if(filterCh!=="all"&&c.c!==parseInt(filterCh))return false;
    const r=ratings[c.t];
    if(filterMode==="weak"&&r!=="bad")return false;
    if(filterMode==="ok"&&r!=="ok")return false;
    if(filterMode==="unrated"&&r)return false;
    return true;
  });
}

function updateStats(){
  document.getElementById("stat-total").textContent=cards.length;
  document.getElementById("stat-good").textContent=D.filter(c=>ratings[c.t]==="good").length;
  document.getElementById("stat-ok").textContent=D.filter(c=>ratings[c.t]==="ok").length;
  document.getElementById("stat-bad").textContent=D.filter(c=>ratings[c.t]==="bad").length;
  document.getElementById("stat-unrated").textContent=D.filter(c=>!ratings[c.t]).length;
  const rated=D.filter(c=>ratings[c.t]).length;
  document.getElementById("progress-fill").style.width=(D.length?Math.round(rated/D.length*100):0)+"%";
  document.getElementById("subtitle").textContent="全"+D.length+"語収録 — カードをクリックで意味を表示";
}

function renderCard(){
  const area=document.getElementById("card-area");
  if(!cards.length){
    area.innerHTML='<div class="empty">該当するカードがありません</div>';
    document.getElementById("progress-text").textContent="0 / 0";
    document.getElementById("rating-row").style.display="none";
    return;
  }
  if(area.querySelector(".empty")) location.reload(); // 簡易リセット
  const card=cards[current];
  const ch=card.c;
  const badge=document.getElementById("card-badge");
  const badge2=document.getElementById("card-badge2");
  badge.textContent=chName[ch];
  badge.style.background=chBg[ch];
  badge.style.color=chFg[ch];
  badge2.textContent=chName[ch];
  badge2.style.background=chBg[ch];
  badge2.style.color=chFg[ch];
  document.getElementById("card-meta").textContent=(current+1)+" / "+cards.length;
  document.getElementById("card-term").textContent=card.t;
  document.getElementById("card-desc").textContent=card.d;
  document.getElementById("prev-btn").disabled=current===0;
  document.getElementById("next-btn").disabled=current===cards.length-1;
  document.getElementById("progress-text").textContent=(current+1)+" / "+cards.length;
  const w=document.getElementById("card-wrapper");
  w.classList.toggle("flipped",flipped);
  document.getElementById("rating-row").style.display=flipped?"flex":"none";
  const r=ratings[card.t];
  ["good","ok","bad"].forEach(k=>{
    const b=document.getElementById("rb-"+k);
    b.className="r-btn "+k+(r===k?" rated-"+k:"");
  });
  updateStats();
}

function flipCard(){
  flipped=!flipped;
  document.getElementById("card-wrapper").classList.toggle("flipped",flipped);
  document.getElementById("rating-row").style.display=flipped?"flex":"none";
}

function navigate(dir){
  flipped=false;
  current=Math.max(0,Math.min(cards.length-1,current+dir));
  renderCard();
}

function rate(r){
  if(!cards.length)return;
  ratings[cards[current].t]=r;
  saveRatings();
  ["good","ok","bad"].forEach(k=>{
    document.getElementById("rb-"+k).className="r-btn "+k+(r===k?" rated-"+k:"");
  });
  updateStats();
  if(current<cards.length-1){flipped=false;current++;renderCard();}
}

// キーボード操作
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")navigate(-1);
  else if(e.key==="ArrowRight")navigate(1);
  else if(e.key===" "||e.key==="Enter"){e.preventDefault();flipCard();}
  else if(e.key==="1")rate("good");
  else if(e.key==="2")rate("ok");
  else if(e.key==="3")rate("bad");
});

document.getElementById("chapter-filter").addEventListener("change",e=>{filterCh=e.target.value;cards=getFiltered();current=0;flipped=false;renderCard();});
document.getElementById("mode-filter").addEventListener("change",e=>{filterMode=e.target.value;cards=getFiltered();current=0;flipped=false;renderCard();});
document.getElementById("shuffle-btn").addEventListener("click",()=>{
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
  current=0;flipped=false;renderCard();
});
document.getElementById("reset-btn").addEventListener("click",()=>{
  if(confirm("進捗をすべてリセットしますか？")){
    ratings={};saveRatings();updateStats();renderCard();
  }
});

cards=getFiltered();
renderCard();
</script>
